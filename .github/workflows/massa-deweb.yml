name: Massa DeWeb

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  GH_TOKEN: ${{ secrets.github_token }}
  DEWEB_CLI_VERSION: 0.6.1

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref_name == 'master'

    steps:
      - name: Checkout repository 🛎️
        uses: actions/checkout@v4

      - name: Setup Node version 🍀
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies ⚙️
        run: npm ci

      - name: Build static site 🛠️
        run: npm run build

      - name: Validate deployment secrets 🔐
        env:
          SECRET_KEY: ${{ secrets.MASSA_ACCOUNT_SECRET_KEY }}
          CONTRACT_ADDRESS: ${{ secrets.MASSA_WEBSITE_CONTRACT_ADDRESS }}
        run: |
          test -n "$SECRET_KEY" || (echo "Missing secret: MASSA_ACCOUNT_SECRET_KEY" && exit 1)
          test -n "$CONTRACT_ADDRESS" || (echo "Missing secret: MASSA_WEBSITE_CONTRACT_ADDRESS" && exit 1)

      - name: Upload to Massa DeWeb 🌐
        env:
          SECRET_KEY: ${{ secrets.MASSA_ACCOUNT_SECRET_KEY }}
          CONTRACT_ADDRESS: ${{ secrets.MASSA_WEBSITE_CONTRACT_ADDRESS }}
        run: |
          npx -y -p tslib -p @massalabs/deweb-cli@${DEWEB_CLI_VERSION} deweb upload ./dist \
            --node_url https://mainnet.massa.net/api/v2 \
            --address $CONTRACT_ADDRESS \
            --accept_disclaimer \
            --yes

      - name: Save artifacts 💾
        uses: actions/upload-artifact@v4
        with:
          path: dist
